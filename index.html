<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Formatwerk — Social Asset Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg-0:#09090b;--bg-1:#111113;--bg-2:#18181b;--bg-3:#1f1f23;--bg-4:#27272a;--border:#2a2a2e;--border-h:#3f3f46;--t0:#fafafa;--t1:#d4d4d8;--t2:#a1a1aa;--t3:#71717a;--t4:#52525b;--as:rgba(228,228,231,.08);--mono:'JetBrains Mono',monospace;--sans:'Inter',-apple-system,system-ui,sans-serif;--r:6px}
html,body,#root{height:100%;background:var(--bg-0);color:var(--t1);font-family:var(--sans);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg-4);border-radius:3px}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg-1)}
.h-actions{display:flex;align-items:center;gap:6px}
.h-btn{padding:6px 12px;border-radius:var(--r);font-size:9px;font-weight:500;border:1px solid var(--border);background:var(--bg-2);color:var(--t2);cursor:pointer;transition:all .15s;font-family:var(--mono);white-space:nowrap}
.h-btn:hover{border-color:var(--border-h);color:var(--t1);background:var(--bg-3)}
.h-btn.accent{background:var(--t0);color:var(--bg-0);border-color:var(--t0);font-weight:600}
.h-btn.accent:hover{opacity:.9}
.h-btn.accent:disabled{opacity:.35;cursor:default}
.h-btn .h-count{display:inline-flex;align-items:center;justify-content:center;min-width:14px;height:14px;border-radius:7px;background:rgba(255,255,255,.15);font-size:8px;margin-left:4px;padding:0 3px}
.header h1{font-size:14px;font-weight:600;letter-spacing:-.02em;color:var(--t0)}
.header .sub{font-size:10px;color:var(--t4);margin-top:1px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase}
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:320px;min-width:320px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg-1);overflow:hidden}
.rsidebar{width:280px;min-width:280px;border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg-1);overflow:hidden}
.rsidebar .panel{flex:1;overflow-y:auto;padding:16px}
.rsidebar .r-head{padding:12px 16px;border-bottom:1px solid var(--border);font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);font-family:var(--mono)}
.exp-actions{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.exp-btn{padding:8px 12px;border-radius:var(--r);font-size:10px;font-weight:500;border:1px solid var(--border);background:var(--bg-2);color:var(--t2);cursor:pointer;transition:all .15s;font-family:var(--sans);text-align:center;width:100%}
.exp-btn:hover{border-color:var(--border-h);color:var(--t1);background:var(--bg-3)}
.exp-btn.primary{background:var(--t0);color:var(--bg-0);border-color:var(--t0);font-weight:600}
.exp-btn.primary:hover{opacity:.9}
.exp-btn.primary:disabled{opacity:.35;cursor:default}

/* Element order */
.el-order{display:flex;flex-direction:column;gap:2px;margin-bottom:8px}
.el-row{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r);font-size:10px;color:var(--t2);font-family:var(--mono)}
.el-row .el-name{flex:1;font-weight:500}
.el-row .el-color{width:14px;height:14px;border-radius:50%;border:1px solid var(--border);cursor:pointer;padding:0;flex-shrink:0}
.el-row .el-color::-webkit-color-swatch-wrapper{padding:0}.el-row .el-color::-webkit-color-swatch{border:none;border-radius:50%}
.el-row .el-arrows{display:flex;gap:2px}
.el-row .el-arrows button{background:var(--bg-3);border:1px solid var(--border);color:var(--t3);cursor:pointer;font-size:9px;padding:3px 6px;line-height:1;border-radius:var(--r);display:flex;align-items:center;justify-content:center}
.el-row .el-arrows button:hover{color:var(--t1);background:var(--bg-4);border-color:var(--border-h)}

/* Collapsible section */
.collapse-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:6px 0;margin-bottom:4px}
.collapse-head:hover .collapse-arrow{color:var(--t2)}
.collapse-arrow{font-size:9px;color:var(--t4);transition:transform .15s}
.collapse-arrow.open{transform:rotate(90deg)}
/* Texture */
.tex-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.tex-btn{padding:8px 4px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg-2);cursor:pointer;text-align:center;transition:all .15s;font-size:8px;font-weight:500;color:var(--t3)}
.tex-btn:hover{border-color:var(--border-h);color:var(--t2)}
.tex-btn.on{border-color:var(--t3);background:var(--as);color:var(--t1)}
/* Distribution modes */
.dist-modes{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:8px}
.dist-btn{padding:6px 4px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg-2);cursor:pointer;text-align:center;transition:all .15s}
.dist-btn:hover{border-color:var(--border-h)}
.dist-btn.on{border-color:var(--t3);background:var(--as)}
.dist-btn .dist-icon{display:flex;flex-direction:column;align-items:center;gap:1px;height:24px;justify-content:center;margin-bottom:2px}
.dist-btn .dist-icon span{display:block;width:14px;border-radius:1px}
.dist-btn .dist-lbl{font-size:7px;color:var(--t4);font-family:var(--mono);letter-spacing:.03em}
.dist-btn.on .dist-lbl{color:var(--t2)}
.el-spacer{display:flex;align-items:center;gap:6px;padding:2px 8px}
.el-spacer input[type="range"]{flex:1;height:2px}
.el-spacer .el-sp-val{font-size:8px;color:var(--t4);font-family:var(--mono);min-width:30px;text-align:right}
/* Queue card */
.q-card{display:flex;align-items:center;gap:8px;padding:8px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg-2);margin-bottom:4px;transition:all .15s}
.q-card:hover{border-color:var(--border-h)}
.q-card .q-thumb{width:36px;height:48px;object-fit:cover;border-radius:3px;border:1px solid var(--border);flex-shrink:0;background:var(--bg-3)}
.q-card .q-info{flex:1;min-width:0}
.q-card .q-title{font-size:10px;color:var(--t1);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.q-card .q-meta{font-size:8px;color:var(--t4);font-family:var(--mono);margin-top:1px}
.q-card .q-rm{background:none;border:none;color:var(--t4);cursor:pointer;font-size:10px;padding:2px 4px;border-radius:3px}
.q-card .q-rm:hover{color:#ef4444;background:var(--bg-4)}

.queue-empty{padding:24px 12px;text-align:center;font-size:10px;color:var(--t4);font-family:var(--mono);border:1px dashed var(--border);border-radius:var(--r)}
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tabs button{flex:1;padding:11px 0;font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;background:none;border:none;color:var(--t4);cursor:pointer;transition:color .15s;font-family:var(--mono)}
.tabs button:hover{color:var(--t2)}.tabs button.active{color:var(--t0);box-shadow:inset 0 -1px 0 var(--t0)}
.panel{flex:1;overflow-y:auto;padding:20px}
.sec{margin-bottom:20px}.sec-t{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t4);margin-bottom:8px;font-family:var(--mono)}
.uz{border:1px dashed var(--border);border-radius:var(--r);padding:18px 14px;text-align:center;font-size:11px;color:var(--t3);cursor:pointer;transition:all .15s;background:transparent;width:100%;font-family:var(--sans)}
.uz:hover{border-color:var(--t4);color:var(--t2);background:var(--as)}.uz.has{border-style:solid;border-color:var(--border-h)}
.fld{margin-bottom:8px}.fl{font-size:10px;color:var(--t3);margin-bottom:4px;display:flex;justify-content:space-between}.fv{font-family:var(--mono);font-size:9px;color:var(--t4)}
input[type="range"]{-webkit-appearance:none;width:100%;height:3px;background:var(--bg-4);border-radius:2px;outline:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--t0);border-radius:50%;cursor:pointer;border:2px solid var(--bg-0)}
input[type="color"]{-webkit-appearance:none;border:1px solid var(--border);border-radius:var(--r);width:28px;height:28px;cursor:pointer;background:transparent;padding:2px}
input[type="color"]::-webkit-color-swatch-wrapper{padding:0}input[type="color"]::-webkit-color-swatch{border:none;border-radius:3px}
input[type="text"],textarea{width:100%;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;font-size:11px;color:var(--t1);font-family:var(--sans);transition:border-color .15s;resize:none}
input[type="text"]:focus,textarea:focus{border-color:var(--t4);outline:none}
input[type="checkbox"]{-webkit-appearance:none;width:13px;height:13px;border:1px solid var(--border);border-radius:3px;background:var(--bg-2);cursor:pointer;position:relative;flex-shrink:0}
input[type="checkbox"]:checked{background:var(--t0);border-color:var(--t0)}
input[type="checkbox"]:checked::after{content:'';position:absolute;left:3.5px;top:1px;width:4px;height:7px;border:solid var(--bg-0);border-width:0 1.5px 1.5px 0;transform:rotate(45deg)}
.btn{padding:6px 12px;border-radius:var(--r);font-size:10px;font-weight:500;border:1px solid var(--border);background:var(--bg-2);color:var(--t2);cursor:pointer;transition:all .15s;font-family:var(--sans)}
.btn:hover{border-color:var(--border-h);color:var(--t1);background:var(--bg-3)}.btn.on{background:var(--t0);color:var(--bg-0);border-color:var(--t0)}
.btn-p{padding:9px 18px;border-radius:var(--r);font-size:11px;font-weight:600;border:none;background:var(--t0);color:var(--bg-0);cursor:pointer;transition:all .15s;font-family:var(--sans)}
.btn-p:hover{opacity:.9}.btn-p:disabled{opacity:.35;cursor:default}
.btn-g{background:none;border:none;color:var(--t3);font-size:10px;cursor:pointer;padding:3px 0;font-family:var(--mono);transition:color .15s}
.btn-g:hover{color:var(--t1)}.btn-g.danger:hover{color:#ef4444}
.pill{padding:4px 11px;border-radius:20px;font-size:10px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--t3);cursor:pointer;transition:all .15s}
.pill:hover{border-color:var(--border-h);color:var(--t2)}.pill.on{background:var(--t0);color:var(--bg-0);border-color:var(--t0)}
.fc{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--r);border:1px solid var(--border);cursor:pointer;transition:all .15s;margin-bottom:5px}
.fc:hover{border-color:var(--border-h);background:var(--as)}.fc.sel{border-color:var(--t3);background:var(--as)}
.fc .nm{font-size:11px;font-weight:500;color:var(--t1)}.fc .dm{font-size:9px;color:var(--t4);font-family:var(--mono);margin-top:1px}
.og{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.ob{padding:7px;border-radius:var(--r);font-size:9px;font-weight:500;background:var(--bg-2);border:1px solid var(--border);color:var(--t3);cursor:pointer;transition:all .15s}
.ob:hover{border-color:var(--border-h);color:var(--t2)}.ob.on{background:var(--t0);color:var(--bg-0);border-color:var(--t0)}
.row{display:flex;align-items:center;gap:8px}.row-w{flex-wrap:wrap}.gap3{gap:3px}
.ec{display:flex;align-items:center;justify-content:space-between;padding:10px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg-2);margin-bottom:5px}
.ca{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;background:var(--bg-0);overflow:auto}
.cm{font-size:9px;color:var(--t4);font-family:var(--mono);margin-bottom:10px;letter-spacing:.04em}
.toolbar{display:flex;align-items:center;margin-bottom:14px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;width:auto;max-width:100%}
.toolbar .t-seg{display:flex;align-items:center;gap:6px;padding:5px 10px;border-right:1px solid var(--border)}
.toolbar .t-seg:last-child{border-right:none}
.toolbar .t-seg.nav button{background:none;border:none;color:var(--t3);cursor:pointer;font-size:12px;padding:0 1px;line-height:1}
.toolbar .t-seg.nav button:hover{color:var(--t0)}
.toolbar .t-lbl{font-size:9px;color:var(--t4);font-family:var(--mono);letter-spacing:.04em;white-space:nowrap}
.toolbar .t-fmt{padding:5px 9px;font-size:9px;font-weight:500;background:none;border:none;border-right:1px solid var(--border);color:var(--t4);cursor:pointer;transition:all .12s;font-family:var(--mono);letter-spacing:.02em;white-space:nowrap}
.toolbar .t-fmt:last-child{border-right:none}
.toolbar .t-fmt:hover{color:var(--t2);background:var(--bg-3)}
.toolbar .t-fmt.on{color:var(--t0);background:var(--bg-0)}
.cw{}
.cw canvas{display:block;max-height:calc(100vh - 180px);max-width:100%;object-fit:contain;border-radius:6px}
.fp{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
.badge{display:inline-block;font-size:9px;font-family:var(--mono);background:var(--bg-4);color:var(--t1);padding:2px 8px;border-radius:10px}
.cn{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r)}
.cn .lb{font-size:10px;color:var(--t3);font-family:var(--mono)}
.cn button{background:var(--bg-3);border:1px solid var(--border);color:var(--t1);width:24px;height:24px;border-radius:var(--r);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.cn button:hover{background:var(--bg-4)}
.pb{width:100%;height:3px;background:var(--bg-4);border-radius:2px;overflow:hidden;margin-top:8px}.pb .f{height:100%;background:var(--t0);transition:width .2s}
.ft{display:inline-block;font-size:8px;font-family:var(--mono);padding:2px 6px;border-radius:3px;margin:1px}
.ft.avail{color:var(--t2);background:var(--bg-3)}.ft.active{color:var(--t0);background:var(--bg-4);font-weight:600}
/* Position grid */
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;width:100%}
.pc{width:100%;aspect-ratio:1;border-radius:var(--r);border:1px solid var(--border);background:var(--bg-2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--t3);transition:all .15s}
.pc:hover{border-color:var(--border-h)}.pc.on{background:var(--t0);color:var(--bg-0);border-color:var(--t0)}
/* Shadow grid */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.sc{padding:8px 4px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg-2);cursor:pointer;text-align:center;transition:all .15s;font-size:8px;font-weight:500;color:var(--t3)}
.sc:hover{border-color:var(--border-h);color:var(--t2)}.sc.on{border-color:var(--t0);background:var(--as);color:var(--t1)}
.sc .sp{height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--t1);margin-bottom:3px}
/* Resolution */
.rr{display:flex;gap:3px;margin-bottom:12px}
.rb{flex:1;padding:8px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg-2);color:var(--t3);cursor:pointer;text-align:center;transition:all .15s;font-family:var(--mono);font-size:10px}
.rb:hover{border-color:var(--border-h);color:var(--t2)}.rb.on{border-color:var(--t0);background:var(--t0);color:var(--bg-0)}
.rb .big{font-size:13px;font-weight:700;display:block}.rb .sm{font-size:8px;opacity:.7;margin-top:1px}
/* Shadow strength slider */
.ss-wrap{margin-top:6px}
@media(max-width:768px){.body{flex-direction:column}.sidebar{width:100%;min-width:auto;max-height:40vh;border-right:none;border-bottom:1px solid var(--border)}.rsidebar{width:100%;min-width:auto;max-height:30vh;border-left:none;border-top:1px solid var(--border)}.ca{padding:16px}}
</style>
</head>

  feed:{t:10,b:10,l:10,r:10},
  story:{t:12,b:14,l:8,r:8},
  square:{t:10,b:10,l:10,r:10},
  landscape:{t:14,b:14,l:8,r:8},
  twitter:{t:12,b:12,l:8,r:8},
  pinterest:{t:8,b:10,l:8,r:8},
  yt_thumb:{t:12,b:16,l:8,r:8},
  fb_cover:{t:16,b:16,l:8,r:8},
};

// 9 position presets (3x3 grid) - dynamically computed from format padding
function getPOS(fmtId){
  const p=FMT_PAD[fmtId]||{t:10,b:10,l:10,r:10};
  const lx=p.l, cx=50, rx=100-p.r;
  const ty=p.t, cy=50, by=100-p.b;
  return[
    {id:"tl",x:lx,y:ty,a:"left"},{id:"tc",x:cx,y:ty,a:"center"},{id:"tr",x:rx,y:ty,a:"right"},
    {id:"cl",x:lx,y:cy,a:"left"},{id:"cc",x:cx,y:cy,a:"center"},{id:"cr",x:rx,y:cy,a:"right"},
    {id:"bl",x:lx,y:by,a:"left"},{id:"bc",x:cx,y:by,a:"center"},{id:"br",x:rx,y:by,a:"right"},
  ];
}
const POS_LABELS=["\u2196","\u2191","\u2197","\u2190","\u00b7","\u2192","\u2199","\u2193","\u2198"];

/* ═══ OT HELPERS ══════════════════════════════════ */
const OT_LABELS={liga:"Ligatures",dlig:"Discretionary Lig.",calt:"Contextual Alt.",salt:"Stylistic Alt.",swsh:"Swash",kern:"Kerning",aalt:"Access All Alt.",ordn:"Ordinals",frac:"Fractions",smcp:"Small Caps",c2sc:"Caps to Small Caps",onum:"Old-style Nums",lnum:"Lining Nums",tnum:"Tabular Nums",pnum:"Proportional Nums",ss01:"Stylistic Set 1",ss02:"Stylistic Set 2",ss03:"Stylistic Set 3",ss04:"Stylistic Set 4",ss05:"Stylistic Set 5",ss06:"Stylistic Set 6",ss07:"Stylistic Set 7",ss08:"Stylistic Set 8",ss09:"Stylistic Set 9",ss10:"Stylistic Set 10",ss11:"Stylistic Set 11",ss12:"Stylistic Set 12",ss13:"Stylistic Set 13",ss14:"Stylistic Set 14",ss15:"Stylistic Set 15",ss16:"Stylistic Set 16",ss17:"Stylistic Set 17",ss18:"Stylistic Set 18",ss19:"Stylistic Set 19",ss20:"Stylistic Set 20"};

function detectOTFeatures(otFont){
  try{
    if(!otFont?.tables?.gsub?.features)return[];
    return[...new Set(otFont.tables.gsub.features.map(f=>f.tag))];
  }catch(e){return[]}
}
function hexRgb(h){h=h.replace("#","");if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]}

/* ═══ SVG FOREIGNOBJECT OT RENDERER ══════════════ */
// Renders text with full browser OT feature support by embedding font + text
// in an SVG foreignObject, which uses the browser's native HarfBuzz shaper.
async function renderTextSVG(text,fontSize,fontName,fontDataUri,features,color,maxW,lineH,bold,italic){
  const featStr=Object.entries(features).filter(([,v])=>v).map(([k])=>`"${k}" 1`).join(', ');
  if(!featStr)return null;
  // Measure using DOM (font is already loaded in document via FontFace API)
  const m=document.createElement('div');
  const fontCSS=`${italic?'italic ':''}${bold?'700 ':'400 '}${fontSize}px "${fontName}",sans-serif`;
  m.style.cssText=`position:fixed;top:-9999px;left:-9999px;visibility:hidden;font:${fontCSS};font-feature-settings:${featStr};line-height:${lineH};max-width:${maxW}px;white-space:pre-wrap;word-break:break-word;`;
  m.textContent=text;
  document.body.appendChild(m);
  const w=m.scrollWidth+6;
  const h=m.scrollHeight+6;
  document.body.removeChild(m);
  const esc=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br xmlns="http://www.w3.org/1999/xhtml"/>');
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><defs><style>@font-face{font-family:"_OTR";src:url("${fontDataUri}")}</style></defs><foreignObject width="${w}" height="${h}"><div xmlns="http://www.w3.org/1999/xhtml" style="margin:0;padding:0;font:${italic?'italic ':''}${bold?'700 ':'400 '}${fontSize}px '_OTR',sans-serif;font-feature-settings:${featStr};line-height:${lineH};color:${color};white-space:pre-wrap;word-break:break-word;">${esc}</div></foreignObject></svg>`;
  return new Promise((resolve)=>{
    const blob=new Blob([svg],{type:'image/svg+xml;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const img=new Image();
    img.onload=()=>{URL.revokeObjectURL(url);resolve({img,w,h})};
    img.onerror=(e)=>{console.warn('SVG OT render error:',e);URL.revokeObjectURL(url);resolve(null)};
    img.src=url;
  });
}



/* ═══ TEXTURE GENERATORS ══════════════════════════════════ */
function generateTexture(mode,w,h){
  const c=document.createElement("canvas");c.width=w;c.height=h;
  const ctx=c.getContext("2d");
  if(mode==="grain"){
    const id=ctx.createImageData(w,h);const d=id.data;
    for(let i=0;i<d.length;i+=4){const v=Math.random()*255;d[i]=v;d[i+1]=v;d[i+2]=v;d[i+3]=Math.random()*60+20}
    ctx.putImageData(id,0);
  }else if(mode==="paper"){
    const id=ctx.createImageData(w,h);const d=id.data;
    for(let i=0;i<d.length;i+=4){
      const x=(i/4)%w,y=Math.floor((i/4)/w);
      const n=Math.sin(x*0.05)*10+Math.cos(y*0.08)*8+Math.random()*30;
      d[i]=200+n;d[i+1]=195+n;d[i+2]=185+n;d[i+3]=Math.random()*40+15;
    }
    ctx.putImageData(id,0);
  }else if(mode==="canvas"){
    ctx.fillStyle="rgba(180,175,165,0.08)";ctx.fillRect(0,0,w,h);
    for(let y=0;y<h;y+=2){ctx.fillStyle=`rgba(${120+Math.random()*40},${115+Math.random()*40},${110+Math.random()*40},${Math.random()*0.06})`;ctx.fillRect(0,y,w,1)}
    for(let x=0;x<w;x+=3){ctx.fillStyle=`rgba(${130+Math.random()*40},${125+Math.random()*40},${120+Math.random()*40},${Math.random()*0.04})`;ctx.fillRect(x,0,1,h)}
  }else if(mode==="halftone"){
    ctx.fillStyle="transparent";ctx.clearRect(0,0,w,h);
    const dotSp=6;
    for(let y=0;y<h;y+=dotSp){for(let x=0;x<w;x+=dotSp){
      const r=Math.random()*1.5+0.3;
      ctx.beginPath();ctx.arc(x+Math.random()*2,y+Math.random()*2,r,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.15+0.05})`;ctx.fill();
    }}
  if(mode==="foil"){
    const id=ctx.createImageData(w,h);const d=id.data;
    for(let i=0;i<d.length;i+=4){
      const x=(i/4)%w,y=Math.floor((i/4)/w);
      const v=Math.sin(x*0.3+y*0.2)*80+Math.cos(x*0.15-y*0.4)*60+128;
      d[i]=Math.min(255,v+40);d[i+1]=Math.min(255,v+30);d[i+2]=Math.min(255,v+50);d[i+3]=Math.random()*50+30;
    }
    ctx.putImageData(id,0);
  }
  }
  return c;
}

function applyTexture(ctx,W,H,scale,mode,opacity,customImg){
  if(mode==="none"||!mode)return;
  const op=opacity/100;
  ctx.save();ctx.globalAlpha=op;
  if(mode==="custom"&&customImg){
    ctx.globalCompositeOperation="multiply";
    ctx.drawImage(customImg,0,0,W,H);
  }else{
    const tc=generateTexture(mode,Math.min(W,1200),Math.min(H,1200));
    ctx.globalCompositeOperation="multiply";
    ctx.drawImage(tc,0,0,W,H);
  }
  ctx.restore();
}

/* ═══ INLINE MARKUP PARSER: *text* → italic runs ═══════════ */
function parseMarkup(text){
  // Splits "normal *italic* normal" into [{text:"normal ",it:false},{text:"italic",it:true},{text:" normal",it:false}]
  const runs=[];
  const re=/\*([^*]+)\*/g;
  let last=0,m;
  while((m=re.exec(text))!==null){
    if(m.index>last)runs.push({text:text.slice(last,m.index),it:false});
    runs.push({text:m[1],it:true});
    last=m.index+m[0].length;
  }
  if(last<text.length)runs.push({text:text.slice(last),it:false});
  if(!runs.length)runs.push({text:text,it:false});
  return runs;
}

/* ═══ MIXED-FONT WORD WRAP ═════════════════════════════════ */
function wrapMixed(ctx,text,maxW,regFont,italFont,fs,bold){
  // Parse markup, then wrap words across lines respecting font switches
  const runs=parseMarkup(text);
  // Flatten into word tokens with italic flag
  const tokens=[];
  for(const run of runs){
    // Split on spaces while preserving space info
    const parts=run.text.split(/( +)/);
    for(const p of parts){
      if(p.length>0)tokens.push({text:p,it:run.it});
    }
  }
  // Build lines by measuring each token with its font
  const lines=[];
  let curLine=[];let curW=0;
  const measure=(tok)=>{
    const ff=tok.it&&italFont?italFont:regFont;
    ctx.font=`${tok.it?"italic ":""}${bold?"700 ":"400 "}${fs}px "${ff}",Inter,sans-serif`;
    return ctx.measureText(tok.text).width;
  };
  for(const tok of tokens){
    // Handle explicit newlines
    if(tok.text.includes("\n")){
      const parts=tok.text.split("\n");
      for(let pi=0;pi<parts.length;pi++){
        if(pi>0){lines.push([...curLine]);curLine=[];curW=0}
        if(parts[pi].length>0){
          const sub={text:parts[pi],it:tok.it};
          const tw=measure(sub);
          if(curW+tw>maxW&&curLine.length>0){lines.push([...curLine]);curLine=[sub];curW=tw}
          else{curLine.push(sub);curW+=tw}
        }
      }
      continue;
    }
    const tw=measure(tok);
    // Space tokens: just add if they fit
    if(tok.text.trim()===""){
      if(curW+tw<=maxW){curLine.push(tok);curW+=tw}
      continue;
    }
    // Word token
    if(curW+tw>maxW&&curLine.length>0){
      // Trim trailing spaces from current line
      while(curLine.length&&curLine[curLine.length-1].text.trim()==="")curLine.pop();
      lines.push([...curLine]);curLine=[tok];curW=tw;
    }else{curLine.push(tok);curW+=tw}
  }
  if(curLine.length){
    while(curLine.length&&curLine[curLine.length-1].text.trim()==="")curLine.pop();
    lines.push(curLine);
  }
  return lines.length?lines:[[{text:"",it:false}]];
}

/* ═══ DRAW MIXED-FONT TEXT ═════════════════════════════════ */
function drawMixed(ctx,text,x,y,fs,regFont,italFont,align,maxW,color,bold,italic,lineH,lsp){
  // If no italic font or no markup, fall back to standard draw
  const hasMarkup=text.includes("*")&&/\*[^*]+\*/.test(text);
  if(!italFont||!hasMarkup){
    drawStd(ctx,text.replace(/\*/g,""),x,y,fs,regFont,align,maxW,color,bold,italic,lineH,lsp);
    return;
  }
  ctx.fillStyle=color;ctx.textBaseline="middle";
  const lines=wrapMixed(ctx,text,maxW,regFont,italFont,fs,bold);
  const lh=fs*(lineH||1.2);
  const totalH=lines.length*lh;
  const startY=y-totalH/2+lh/2;

  lines.forEach((tokens,i)=>{
    const ly=startY+i*lh;
    // Measure total line width for alignment
    let lineW=0;
    const widths=tokens.map(tok=>{
      const ff=tok.it&&italFont?italFont:regFont;
      ctx.font=`${tok.it?"italic ":""}${bold?"700 ":"400 "}${fs}px "${ff}",Inter,sans-serif`;
      const w=lsp&&tok.text.trim()!==""?ctx.measureText(tok.text).width+lsp*(tok.text.length-1):ctx.measureText(tok.text).width;
      lineW+=w;
      return w;
    });
    // Start x based on alignment
    let sx=align==="center"?x-lineW/2:align==="right"?x-lineW:x;
    ctx.textAlign="left";
    tokens.forEach((tok,ti)=>{
      const ff=tok.it&&italFont?italFont:regFont;
      ctx.font=`${tok.it?"italic ":""}${bold?"700 ":"400 "}${fs}px "${ff}",Inter,sans-serif`;
      if(lsp&&tok.text.trim()!==""){
        for(let c=0;c<tok.text.length;c++){
          ctx.fillText(tok.text[c],sx,ly);
          sx+=ctx.measureText(tok.text[c]).width+lsp;
        }
      }else{
        ctx.fillText(tok.text,sx,ly);
        sx+=widths[ti];
      }
    });
  });
}

/* ═══ TEXT WRAP ════════════════════════════════════ */
function wrapStd(ctx,text,maxW){
  const lines=[];text.split("\n").forEach(p=>{const w=p.split(" ");let c="";
    w.forEach(wd=>{const t=c?c+" "+wd:wd;if(ctx.measureText(t).width>maxW&&c){lines.push(c);c=wd}else c=t});
    if(c)lines.push(c)});return lines.length?lines:[""]
}
/* ═══ DRAWING ENGINE ══════════════════════════════ */
function drawCanvas(canvas,P,scale){
  scale=scale||1;
  // Attempt wide-gamut display-p3 color space for richer colors (Figma does this)
  let ctx;
  try{ctx=canvas.getContext("2d",{colorSpace:"display-p3",willReadFrequently:false})}catch(e){ctx=canvas.getContext("2d")}
  const W=P.preset.w,H=P.preset.h;
  canvas.width=W*scale;canvas.height=H*scale;
  ctx.scale(scale,scale);
  // High-quality rendering: bicubic image resampling + text antialiasing
  ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality="high";
  // Hint for better text antialiasing (works in Chrome/Edge)
  try{canvas.style.textRendering="optimizeLegibility";canvas.style.webkitFontSmoothing="antialiased"}catch(e){}

  // BG
  ctx.fillStyle=P.bgColor;ctx.fillRect(0,0,W,H);

  // Image — high quality resampling with subpixel positioning
  if(P.img){
    const ir=P.img.width/P.img.height,cr=W/H;let sw,sh,sx,sy;
    if(ir>cr){sh=P.img.height;sw=sh*cr;sx=(P.img.width-sw)/2+(P.imgPos.x/100)*((P.img.width-sw)/2);sy=(P.img.height-sh)/2+(P.imgPos.y/100)*((P.img.height-sh)/2)}
    else{sw=P.img.width;sh=sw/cr;sx=(P.img.width-sw)/2+(P.imgPos.x/100)*((P.img.width-sw)/2);sy=(P.img.height-sh)/2+(P.imgPos.y/100)*((P.img.height-sh)/2)}
    // For large source images being downscaled: use stepped downscaling for sharper results
    if(P.img.width>W*scale*2){
      // Multi-step downscale (Figma technique: halve iteratively for sharper output)
      const tc=document.createElement("canvas");
      let tw=P.img.width,th=P.img.height;
      tc.width=tw;tc.height=th;
      const tctx=tc.getContext("2d");
      tctx.imageSmoothingEnabled=true;tctx.imageSmoothingQuality="high";
      tctx.drawImage(P.img,0,0);
      // Halve until within 2x of target
      const targetW=W*scale,targetH=H*scale;
      while(tw>targetW*2&&th>targetH*2){
        tw=Math.max(Math.ceil(tw/2),targetW);th=Math.max(Math.ceil(th/2),targetH);
        const sc2=document.createElement("canvas");sc2.width=tw;sc2.height=th;
        const sctx2=sc2.getContext("2d");sctx2.imageSmoothingEnabled=true;sctx2.imageSmoothingQuality="high";
        sctx2.drawImage(tc,0,0,tw,th);
        tc.width=tw;tc.height=th;tctx.drawImage(sc2,0,0);
      }
      // Final draw from pre-scaled source
      const fir=tw/th;
      let fsw,fsh,fsx,fsy;
      if(fir>cr){fsh=th;fsw=fsh*cr;fsx=(tw-fsw)/2+(P.imgPos.x/100)*((tw-fsw)/2);fsy=(th-fsh)/2+(P.imgPos.y/100)*((th-fsh)/2)}
      else{fsw=tw;fsh=fsw/cr;fsx=(tw-fsw)/2+(P.imgPos.x/100)*((tw-fsw)/2);fsy=(th-fsh)/2+(P.imgPos.y/100)*((th-fsh)/2)}
      ctx.drawImage(tc,fsx,fsy,fsw,fsh,0,0,W,H);
    }else{
      ctx.drawImage(P.img,sx,sy,sw,sh,0,0,W,H);
    }
  }

  // Overlay
  doOverlay(ctx,W,H,P.overlay);

  // Global texture
  applyTexture(ctx,W,H,scale,P.texMode,P.texOpacity,P.texImg);

  // ── Measure block elements ──────────────────
  const sf=Math.min(W,H)/1080;
  let logoH=0,logoW=0;
  if(P.logoImg){const sc=(P.logoScale/100)*sf;logoW=P.logoImg.width*sc;logoH=P.logoImg.height*sc}

  const headFS=P.headSize*sf;
  const headMaxW=(P.headMaxWPct/100)*W;
  // Use _OT font family when OT features are active (has featureSettings baked in)
  const hasActiveOT=P.enabledOT&&Object.values(P.enabledOT).some(v=>v);
  const headFontEff=hasActiveOT&&P.headFontName?P.headFontName+"_OT":(P.headFontName||"Inter");
  // Layer 3: set CSS font-feature-settings on canvas element itself
  if(hasActiveOT){const fs=Object.entries(P.enabledOT).filter(([,v])=>v).map(([k])=>`"${k}" 1`).join(", ");canvas.style.fontFeatureSettings=fs}else{canvas.style.fontFeatureSettings="normal"}

  let headTotalH=0;
  const hasOTImg=!!P._otHeadImg;
  const hasHeadMarkup=P.headText&&P.headText.includes("*")&&/\*[^*]+\*/.test(P.headText);
  const headItalicEff=P.headItalicFontName||null;
  if(P.headText){
    if(hasOTImg){
      headTotalH=P._otHeadImg.h;
    }else if(hasHeadMarkup&&headItalicEff){
      const mLines=wrapMixed(ctx,P.headText,headMaxW,headFontEff,headItalicEff,headFS,P.headBold);
      headTotalH=mLines.length*headFS*P.headLineH;
    }else{
      ctx.font=`${P.headItalic?"italic ":""}${P.headBold?"700 ":"400 "}${headFS}px "${headFontEff}",${P.headFontName?'"'+P.headFontName+'",':''}Inter,sans-serif`;
      const plainText=P.headText.replace(/\*/g,"");
      const headLines=wrapStd(ctx,plainText,headMaxW);
      headTotalH=headLines.length*headFS*P.headLineH;
    }
  }

  const subFS=P.subSize*sf;
  let subLines=[],subTotalH=0;
  if(P.subText){ctx.font=`${P.subBold?"700 ":"400 "}${subFS}px "${P.subFontName||"Inter"}",Inter,sans-serif`;subLines=wrapStd(ctx,P.subText,W*.8);subTotalH=subLines.length*subFS*P.subLineH}

  const g1=P.logoHeadGap*sf;
  const g2=P.headSubGap*sf;
  const order=P.blockOrder||["logo","head","sub"];

  // Build element list in order with heights and gaps
  const elDefs={
    logo:{h:P.logoImg?logoH:0,present:!!P.logoImg},
    head:{h:P.headText?headTotalH:0,present:!!P.headText},
    sub:{h:P.subText?subTotalH:0,present:!!P.subText}
  };
  const gapMap={logo_head:g1,head_logo:g1,logo_sub:g1,sub_logo:g1,head_sub:g2,sub_head:g2};
  const visEls=order.filter(id=>elDefs[id].present);

  let totalBlockH=0;
  visEls.forEach((id,i)=>{
    totalBlockH+=elDefs[id].h;
    if(i<visEls.length-1){const gk=id+"_"+visEls[i+1];totalBlockH+=(gapMap[gk]||0)}
  });

  const bx=(P.blockX/100)*W;
  const pad=FMT_PAD[P.preset.id]||{t:10,b:10,l:10,r:10};
  const minY=(pad.t/100)*H;
  const maxY=H-(pad.b/100)*H;
  const al=P.textAlign;

  // ── Shadow helper ──
  const shadowStr=P.shadowStrength||1;
  const shp=SHADOWS.find(s=>s.id===P.shadowMode)||SHADOWS[0];
  const withShadow=(drawFn)=>{
    if(shp.layers.length>0){
      shp.layers.forEach(ly=>{
        ctx.save();
        const[r,g,b]=hexRgb(ly.c);
        ctx.shadowColor=`rgba(${r},${g},${b},${Math.min(ly.op*shadowStr,1)})`;
        ctx.shadowBlur=ly.blur*sf*shadowStr;ctx.shadowOffsetX=ly.ox*sf*shadowStr;ctx.shadowOffsetY=ly.oy*sf*shadowStr;
        drawFn();ctx.restore();
      });
      ctx.save();ctx.shadowColor="transparent";ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;
      drawFn();ctx.restore();
    }else{drawFn()}
  };

  // ── Element draw functions (take y position) ──
  const drawEl=(id,y)=>{
    if(id==="logo"&&P.logoImg){
      const lx=al==="center"?bx-logoW/2:al==="left"?bx:bx-logoW;
      const isSVG=P.logoImg._isSVG;
      const drawLogo=()=>{
        if(isSVG)ctx.imageSmoothingEnabled=false;
        if(P.logoTint){
          const lc=document.createElement("canvas");lc.width=Math.ceil(logoW*scale);lc.height=Math.ceil(logoH*scale);
          const lctx=lc.getContext("2d");lctx.scale(scale,scale);
          if(isSVG)lctx.imageSmoothingEnabled=false;
          lctx.drawImage(P.logoImg,0,0,logoW,logoH);
          lctx.globalCompositeOperation="source-in";
          lctx.fillStyle=P.logoTint;lctx.fillRect(0,0,logoW,logoH);
          ctx.drawImage(lc,0,0,lc.width,lc.height,lx,y,logoW,logoH);
        }else{ctx.drawImage(P.logoImg,lx,y,logoW,logoH)}
        if(isSVG){ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality="high"}
      };
      withShadow(drawLogo);
    }
    if(id==="head"&&P.headText){
      if(hasOTImg){
        const oh=P._otHeadImg;
        const lx=al==="center"?bx-oh.w/2:al==="right"?bx-oh.w:bx;
        withShadow(()=>ctx.drawImage(oh.img,lx,y,oh.w,oh.h));
      }else{
        const headCY=y+headTotalH/2;
        const scaledHeadLsp=P.headLetterSp*sf;
        withShadow(()=>{
          ctx.save();
          if(hasHeadMarkup&&headItalicEff){
            drawMixed(ctx,P.headText,bx,headCY,headFS,headFontEff,headItalicEff,al,headMaxW,P.headColor,P.headBold,P.headItalic,P.headLineH,scaledHeadLsp);
          }else{
            drawStd(ctx,P.headText.replace(/\*/g,""),bx,headCY,headFS,headFontEff,al,headMaxW,P.headColor,P.headBold,P.headItalic,P.headLineH,scaledHeadLsp);
          }
          ctx.restore();
        });
      }
    }
    if(id==="sub"&&P.subText){
      const subCY=y+subTotalH/2;
      const scaledSubLsp=P.subLetterSp*sf;
      withShadow(()=>{
        ctx.save();
        drawStd(ctx,P.subText,bx,subCY,subFS,P.subFontName||"Inter",al,W*.8,P.subColor,P.subBold,false,P.subLineH,scaledSubLsp);
        ctx.restore();
      });
    }
  };

  const dm=P.distMode||"stack";
  const usableH=maxY-minY;

  if(dm==="spread"&&visEls.length>=2){
    // SPREAD: first element at top, rest grouped at bottom
    const firstId=visEls[0];
    const restIds=visEls.slice(1);
    const topY=minY;
    drawEl(firstId,topY);
    let restH=0;
    restIds.forEach((id,i)=>{restH+=elDefs[id].h;if(i<restIds.length-1){const gk=id+"_"+restIds[i+1];restH+=(gapMap[gk]||0)}});
    let rY=maxY-restH;
    restIds.forEach((id,i)=>{
      drawEl(id,rY);
      rY+=elDefs[id].h;
      if(i<restIds.length-1){const gk=id+"_"+restIds[i+1];rY+=(gapMap[gk]||0)}
    });
  }else if(dm==="equal"&&visEls.length>=2){
    // EQUAL: all elements equidistant across vertical space
    const totalElH=visEls.reduce((s,id)=>s+elDefs[id].h,0);
    const totalGap=usableH-totalElH;
    const gapSize=totalGap/(visEls.length+1);
    let curY=minY+gapSize;
    visEls.forEach(id=>{
      drawEl(id,curY);
      curY+=elDefs[id].h+gapSize;
    });
  }else if(dm==="top-pair"&&visEls.length>=2){
    // TOP-PAIR: first two elements grouped at top, last at bottom
    const topIds=visEls.slice(0,-1);
    const botId=visEls[visEls.length-1];
    let topH=0;
    topIds.forEach((id,i)=>{topH+=elDefs[id].h;if(i<topIds.length-1){const gk=id+"_"+topIds[i+1];topH+=(gapMap[gk]||0)}});
    let tY=minY;
    topIds.forEach((id,i)=>{
      drawEl(id,tY);
      tY+=elDefs[id].h;
      if(i<topIds.length-1){const gk=id+"_"+topIds[i+1];tY+=(gapMap[gk]||0)}
    });
    drawEl(botId,maxY-elDefs[botId].h);
  }else{
    // STACK: all elements in one block (default)
    let blockTop;
    const rawY=(P.blockY/100)*H;
    if(P.blockY<=33){blockTop=Math.max(rawY,minY)}
    else if(P.blockY>=67){blockTop=Math.min(rawY-totalBlockH,maxY-totalBlockH)}
    else{blockTop=rawY-totalBlockH/2}
    blockTop=Math.max(minY,Math.min(blockTop,maxY-totalBlockH));

    let curY=blockTop;
    visEls.forEach((id,i)=>{
      drawEl(id,curY);
      curY+=elDefs[id].h;
      if(i<visEls.length-1){const gk=id+"_"+visEls[i+1];curY+=(gapMap[gk]||0)}
    });
  }

  // Text texture (composited on top of text elements)
  if(P.txtTexMode&&P.txtTexMode!=="none"){
    const op=P.txtTexOpacity/100;
    ctx.save();ctx.globalAlpha=op;ctx.globalCompositeOperation="source-atop";
    if(P.txtTexMode==="custom"&&P.txtTexImg){ctx.drawImage(P.txtTexImg,0,0,W,H)}
    else{const tc=generateTexture(P.txtTexMode,Math.min(W,1200),Math.min(H,1200));ctx.drawImage(tc,0,0,W,H)}
    ctx.restore();
  }
}

function drawStd(ctx,text,x,y,fs,ff,align,maxW,color,bold,italic,lineH,lsp){
  ctx.font=`${italic?"italic ":""}${bold?"700 ":"400 "}${fs}px "${ff}",Inter,sans-serif`;
  ctx.fillStyle=color;ctx.textAlign=align;ctx.textBaseline="middle";
  const lines=wrapStd(ctx,text,maxW);const lh=fs*(lineH||1.2);
  const totalH=lines.length*lh;const startY=y-totalH/2+lh/2;
  lines.forEach((line,i)=>{
    const ly=startY+i*lh;
    if(lsp){const tw=ctx.measureText(line).width+lsp*(line.length-1);
      let sx=align==="center"?x-tw/2:align==="right"?x-tw:x;
      const pa=ctx.textAlign;ctx.textAlign="left";
      for(let c=0;c<line.length;c++){ctx.fillText(line[c],sx,ly);sx+=ctx.measureText(line[c]).width+lsp}
      ctx.textAlign=pa;
    }else ctx.fillText(line,x,ly);
  });
}

function doOverlay(ctx,w,h,ov){
  if(ov==="none")return;let g;
  switch(ov){
    case"dark-vignette":g=ctx.createRadialGradient(w/2,h/2,w*.2,w/2,h/2,w*.8);g.addColorStop(0,"rgba(0,0,0,0)");g.addColorStop(1,"rgba(0,0,0,.55)");ctx.fillStyle=g;ctx.fillRect(0,0,w,h);break;
    case"light-fade":ctx.fillStyle="rgba(255,255,255,.2)";ctx.fillRect(0,0,w,h);break;
    case"bottom-gradient":g=ctx.createLinearGradient(0,h*.4,0,h);g.addColorStop(0,"rgba(0,0,0,0)");g.addColorStop(1,"rgba(0,0,0,.65)");ctx.fillStyle=g;ctx.fillRect(0,0,w,h);break;
    case"top-gradient":g=ctx.createLinearGradient(0,0,0,h*.5);g.addColorStop(0,"rgba(0,0,0,.65)");g.addColorStop(1,"rgba(0,0,0,0)");ctx.fillStyle=g;ctx.fillRect(0,0,w,h);break;
    case"full-darken":ctx.fillStyle="rgba(0,0,0,.4)";ctx.fillRect(0,0,w,h);break;
  }
}

    try{
      // ── 1. Snapshot all inputs ──
      const fmts=[...selFmts];
      const hdls=[...headlines];
      const imgs=images.length?[...images]:[{id:0,obj:null,name:"no-image"}];
      const baseName=slug(projectName.trim()||"formatwerk",40);
      const tagStr=projectTags.length?"-"+projectTags.join("-"):"";

      // ── 2. Build flat job list: every combo of content × format ──
      // "content" = a headline+image pair (either all-combos or 1:1 paired)
      const contentPairs=[];
      if(expMode==="paired"){
        const pairs=pairings.length?pairings:imgs.map((_,i)=>({imgIdx:i,hdlIdx:i%hdls.length}));
        for(const pair of pairs){contentPairs.push({img:imgs[pair.imgIdx],hdl:hdls[pair.hdlIdx]})}
      }else{
        for(const hdl of hdls){for(const img of imgs){contentPairs.push({img,hdl})}}
      }
      // Deduplicate content pairs
      const seenPairs=new Set();const uniqPairs=[];
      for(const cp of contentPairs){
        const k=`${cp.hdl.id}_${cp.img.id}`;
        if(!seenPairs.has(k)){seenPairs.add(k);uniqPairs.push(cp)}
      }

      // ── 3. Total job count for progress ──
      const totalJobs=uniqPairs.length*fmts.length;
      if(totalJobs===0){sExporting(false);sExpProg(0);return}
      let done=0;

      // ── 4. Single file shortcut (1 pair × 1 format) ──
      if(totalJobs===1){
        const cp=uniqPairs[0];const fid=fmts[0];
        const p=PRESETS.find(x=>x.id===fid);
        const b=await expOne(fid,cp.img.obj,cp.hdl);
        const a=document.createElement("a");a.href=URL.createObjectURL(b);
        a.download=buildFileName(baseName,p.label,1);a.click();
        sExporting(false);sExpProg(0);return;
      }

      // ── 5. Zip export with folder structure ──
      // Structure: BaseName / FormatCategory / BaseName__FormatCategory_01.png
      const zip=new JSZip();

      for(const fid of fmts){
        const p=PRESETS.find(x=>x.id===fid);
        if(!p)continue;
        const catName=fmtFolder(p.label); // e.g. "Feed_Post", "Story_Reel"
        const folder=zip.folder(`${baseName}/${catName}`);
        let num=0;

        for(const cp of uniqPairs){
          num++;
          try{
            const blob=await expOne(fid,cp.img.obj,cp.hdl);
            if(blob){
              const fileName=buildFileName(baseName,p.label,num);
              folder.file(fileName,blob);
            }
          }catch(e){console.warn(`Export failed: ${catName} #${num}:`,e)}
          done++;sExpProg(Math.round(done/totalJobs*100));
        }
      }

      // ── 6. Generate and download zip ──
      const ct=await zip.generateAsync({type:"blob"});
      const zipName=`${baseName}${tagStr}-batch.zip`;
      const a=document.createElement("a");a.href=URL.createObjectURL(ct);a.download=zipName;a.click();

    }catch(e){console.error("Export all error:",e)}
    sExporting(false);sExpProg(0);
  };
  const togFmt=id=>sSelFmts(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const setPos=p=>{sBlockX(p.x);sBlockY(p.y);sTextAlign(p.a)};
  const curPosId=POS.find(p=>p.x===blockX&&p.y===blockY)?.id||"";
  const setAllColor=c=>{sHeadColor(c);sSubColor(c);sLogoTint(c)};
  const clearTint=()=>{sLogoTint(null)};
  const shufflePairings=()=>{
    const n=Math.max(images.length||1,headlines.length);
    const pairs=[];
    for(let i=0;i<n;i++){pairs.push({imgIdx:images.length?i%images.length:0,hdlIdx:i%headlines.length})}
    const hIdxs=pairs.map(p=>p.hdlIdx);
    for(let i=hIdxs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[hIdxs[i],hIdxs[j]]=[hIdxs[j],hIdxs[i]]}
    pairs.forEach((p,i)=>p.hdlIdx=hIdxs[i]);
    sPairings(pairs);
  };

  const addToQueue=async()=>{
    // Capture a small thumbnail of current state
    const tc=document.createElement("canvas");
    const p=PRESETS.find(x=>x.id===preview);
    const params=bP(p,aImg?.obj||null,aHdl);
    await preRenderOT(params,p.w,p.h);
    drawCanvas(tc,params,0.5);
    const thumbUrl=tc.toDataURL("image/jpeg",0.6);
    sQueue(q=>[...q,{
      id:Date.now(),
      imgIdx:aiIdx,
      hdlIdx:ahIdx,
      headline:(aHdl.headline||"").replace(/\*/g,"").substring(0,30),
      thumb:thumbUrl,
      // Snapshot all current settings
      settings:{...params,img:aImg?.obj||null,logoImg,_otHeadImg:params._otHeadImg}
    }]);
  };
  const rmQueue=id=>sQueue(q=>q.filter(x=>x.id!==id));
  const exportQueue=async()=>{
    if(!queue.length)return;
    sExporting(true);sExpProg(0);
    try{
      const fmts=[...selFmts];
      const baseName=slug(projectName.trim()||"formatwerk",40);
      const totalJobs=queue.length*fmts.length;
      if(totalJobs===0){sExporting(false);return}
      let done=0;
      const zip=new JSZip();
      for(const qi of queue){
        for(const fid of fmts){
          const p=PRESETS.find(x=>x.id===fid);if(!p)continue;
          const catName=fmtFolder(p.label);
          const folder=zip.folder(`${baseName}/${catName}`);
          try{
            const qp={...qi.settings,preset:p};
            await preRenderOT(qp,p.w,p.h);
            const c=document.createElement("canvas");
            drawCanvas(c,qp,Math.max(expScale,2));
            const blob=await new Promise(r=>c.toBlob(r,"image/png"));
            if(blob)folder.file(buildFileName(baseName,p.label,done+1),blob);
          }catch(e){console.warn("Queue export err:",e)}
          done++;sExpProg(Math.round(done/totalJobs*100));
        }
      }
      const ct=await zip.generateAsync({type:"blob"});
      const a=document.createElement("a");a.href=URL.createObjectURL(ct);
      a.download=`${baseName}-queue.zip`;a.click();
    }catch(e){console.error("Queue export error:",e)}
    sExporting(false);sExpProg(0);
  };
  const pairingCount=expMode==="paired"?(pairings.length||Math.max(images.length||1,headlines.length)):totalCombos;
  const expTotal=pairingCount*selFmts.length;

  /* ═══ RENDER ═════════════════════════════════ */
  return(
    <div className="app">
      <header className="header">
        <div><h1>{projectName||"Formatwerk"}</h1><div className="sub">{projectName?"Formatwerk":"Social Asset Generator"}</div></div>
        <div className="h-actions">
          <button className="h-btn" onClick={()=>expSingle(preview)}>Export Current</button>
          <button className="h-btn" onClick={()=>{
            (async()=>{
              sExporting(true);sExpProg(0);
              const fmts=[...selFmts];const cp={img:aImg?.obj||null,hdl:aHdl};
              const baseName=slug(projectName.trim()||"formatwerk",40);
              if(fmts.length===1){
                const b=await expOne(fmts[0],cp.img,cp.hdl);const p=PRESETS.find(x=>x.id===fmts[0]);
                const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=buildFileName(baseName,p.label,1);a.click();
              }else{
                const zip=new JSZip();let done=0;
                for(const fid of fmts){
                  const p=PRESETS.find(x=>x.id===fid);if(!p)continue;
                  try{const blob=await expOne(fid,cp.img,cp.hdl);
                    if(blob)zip.file(buildFileName(baseName,p.label,1),blob);
                  }catch(e){console.warn("Export err:",e)}
                  done++;sExpProg(Math.round(done/fmts.length*100));
                }
                const ct=await zip.generateAsync({type:"blob"});
                const a=document.createElement("a");a.href=URL.createObjectURL(ct);a.download=`${baseName}-all-formats.zip`;a.click();
              }
              sExporting(false);sExpProg(0);
            })()
          }} disabled={exporting}>{exporting?`${expProg}%...`:`All Formats (${selFmts.length})`}</button>
          <button className="h-btn" onClick={addToQueue}>+ Queue{queue.length>0&&<span className="h-count">{queue.length}</span>}</button>
          <button className="h-btn accent" onClick={queue.length>0?exportQueue:expAll} disabled={exporting}>
            {exporting?`${expProg}%...`:queue.length>0?`Export Queue (${queue.length})`:`Export All`}
          </button>
        </div>
      </header>
      <div className="body">
        {/* ═══ LEFT SIDEBAR — TOOLS ═══ */}
        <aside className="sidebar">
          <div className="tabs">{["assets","content","style","effects"].map(t=>(<button key={t} className={tab===t?"active":""} onClick={()=>sTab(t)}>{t}</button>))}</div>
          <div className="panel">
            {/* Hidden file inputs — always in DOM so refs work across tabs */}
            <input ref={logoR} type="file" accept="image/*,.svg" style={{display:"none"}} onChange={hLogo}/>
            <input ref={hfR} type="file" accept=".ttf,.otf,.woff,.woff2" style={{display:"none"}} onChange={hHeadFont}/>
            <input ref={sfR} type="file" accept=".ttf,.otf,.woff,.woff2" style={{display:"none"}} onChange={hSubFont}/>
            <input ref={imgR} type="file" accept="image/*,.svg" multiple style={{display:"none"}} onChange={hImages}/>
            <input ref={csvR} type="file" accept=".csv,.tsv,.txt" style={{display:"none"}} onChange={hCSV}/>

            {/* ═══ ASSETS TAB ═══ */}
            {tab==="assets"&&<>
              <div className="sec"><div className="sec-t">Brand Preset</div>
                <div className="row gap3" style={{marginBottom:8}}>
                  {BRAND_PRESETS.map(bp=>(<button key={bp.id} className={`btn ${brandPreset===bp.id?"on":""}`} style={{flex:1,textAlign:"center"}} onClick={()=>{sBrandPreset(bp.id);loadBrandPreset(bp.id)}}>{bp.label}</button>))}
                  <button className={`btn ${brandPreset==="custom"?"on":""}`} style={{flex:1,textAlign:"center"}} onClick={()=>sBrandPreset("custom")}>Custom</button>
                </div>
                <div style={{fontSize:9,color:"var(--t4)",fontFamily:"var(--mono)"}}>
                  {brandPreset==="custom"?"Upload your own logo and fonts below":"Preset: "+BRAND_PRESETS.find(p=>p.id===brandPreset)?.label}
                </div>
              </div>

              <div className="sec"><div className="sec-t">Logo</div>
                <button className={`uz ${logoImg?"has":""}`} onClick={()=>logoR.current.click()}>{logoImg?"Replace logo":"Upload logo"}</button>
                {logoImg&&<div className="fld" style={{marginTop:8}}><div className="fl"><span>Scale</span><span className="fv">{logoScale}%</span></div><input type="range" min={2} max={400} value={logoScale} onChange={e=>sLogoScale(+e.target.value)}/></div>}
              </div>

              <div className="sec"><div className="sec-t">Headline Font</div>
                <button className={`uz ${headFontName?"has":""}`} onClick={()=>hfR.current.click()}>{headFontName?<span style={{fontFamily:"var(--mono)",color:"var(--t1)"}}>{headFontName}</span>:"Upload .ttf / .otf / .woff"}</button>
                {otFeatures.length>0&&<div style={{marginTop:4}}>{otFeatures.map(f=>(<span key={f} className={`ft ${enabledOT[f]?"active":"avail"}`} title={OT_LABELS[f]||f}>{f}</span>))}</div>}
              </div>

              <div className="sec"><div className="sec-t">Subhead Font</div>
                <button className={`uz ${subFontName?"has":""}`} onClick={()=>sfR.current.click()}>{subFontName?<span style={{fontFamily:"var(--mono)",color:"var(--t1)"}}>{subFontName}</span>:"Default: Inter"}</button>
              </div>

              <div className="sec"><div className="sec-t">Images</div>
                <button className={`uz ${images.length?"has":""}`} onClick={()=>imgR.current.click()}>{images.length?`${images.length} loaded — add more`:"Upload images (multi-select)"}</button>
                {images.length>0&&<div style={{marginTop:6,display:"flex",gap:4,flexWrap:"wrap"}}>
                  {images.map((img,i)=>(<div key={img.id} style={{position:"relative",cursor:"pointer"}} onClick={()=>sAiIdx(i)}>
                    <img src={img.url} style={{width:40,height:40,objectFit:"cover",borderRadius:4,border:aiIdx===i?"2px solid var(--t0)":"1px solid var(--border)",opacity:aiIdx===i?1:.5}}/>
                    <button onClick={e=>{e.stopPropagation();rmImg(i)}} style={{position:"absolute",top:-4,right:-4,width:14,height:14,borderRadius:"50%",background:"var(--bg-0)",border:"1px solid var(--border)",color:"var(--t3)",fontSize:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>x</button>
                  </div>))}
                </div>}
                {images.length>0&&<>
                  <div className="fld" style={{marginTop:8}}><div className="fl"><span>Offset X</span><span className="fv">{imgPos.x}%</span></div><input type="range" min={-100} max={100} value={imgPos.x} onChange={e=>sImgPos(p=>({...p,x:+e.target.value}))}/></div>
                  <div className="fld"><div className="fl"><span>Offset Y</span><span className="fv">{imgPos.y}%</span></div><input type="range" min={-100} max={100} value={imgPos.y} onChange={e=>sImgPos(p=>({...p,y:+e.target.value}))}/></div>
                </>}
              </div>

              <div className="sec"><div className="sec-t">Project Name</div>
                <input type="text" value={projectName} onChange={e=>sProjectName(e.target.value)} placeholder="e.g. Summer Campaign 2026" style={{fontSize:10}}/>
                <div style={{marginTop:4,fontSize:8,color:"var(--t4)",fontFamily:"var(--mono)"}}>Used as base filename for exports</div>
              </div>

              <div className="sec"><div className="sec-t">CSV Import</div>
                <div style={{padding:"10px 12px",border:"1px dashed var(--border)",borderRadius:"var(--r)",fontSize:10,color:"var(--t4)",fontFamily:"var(--mono)",textAlign:"center",cursor:"pointer",transition:"all .15s"}}
                  onClick={()=>csvR.current.click()}
                  onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="var(--t3)";e.currentTarget.style.color="var(--t2)"}}
                  onDragLeave={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.color="var(--t4)"}}
                  onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.color="var(--t4)";const f=e.dataTransfer.files[0];if(f&&(f.name.endsWith('.csv')||f.name.endsWith('.tsv')||f.name.endsWith('.txt'))){const ev={target:{files:[f]}};hCSV(ev)}}}>
                  Drop CSV or click to import headlines
                </div>
              </div>
            </>}

            {/* ═══ CONTENT TAB ═══ */}
            {tab==="content"&&<>
              <div className="sec"><div className="sec-t">Headlines ({headlines.length})</div>
                <div style={{maxHeight:200,overflowY:"auto",border:"1px solid var(--border)",borderRadius:"var(--r)"}}>
                  {headlines.map((h,i)=>(<div key={h.id} style={{padding:"8px 10px",borderBottom:"1px solid var(--border)",cursor:"pointer",background:ahIdx===i?"var(--as)":"transparent",display:"flex",alignItems:"center",gap:8}} onClick={()=>sAhIdx(i)}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:11,color:"var(--t1)",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.headline||"\u2014"}</div>
                      {!subLocked&&<div style={{fontSize:9,color:"var(--t4)",fontFamily:"var(--mono)",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.subheadline||"\u2014"}</div>}
                    </div>
                    {headlines.length>1&&<button className="btn-g danger" onClick={e=>{e.stopPropagation();rmHdl(i)}} style={{fontSize:12}}>x</button>}
                  </div>))}
                </div>
                <div className="row" style={{marginTop:6,gap:8}}>
                  <button className="btn-g" onClick={()=>{sHeadlines(p=>[...p,{id:Date.now(),headline:"NEW HEADLINE",subheadline:""}]);sAhIdx(headlines.length)}}>+ Add</button>
                  <button className="btn-g" onClick={()=>csvR.current.click()}>+ CSV</button>
                </div>
              </div>

              <div className="sec">
                <div style={{padding:10,background:"var(--bg-2)",borderRadius:"var(--r)",border:"1px solid var(--border)"}}>
                  <div style={{fontSize:9,color:"var(--t4)",fontFamily:"var(--mono)",marginBottom:4}}>Editing #{ahIdx+1}</div>
                  <textarea value={aHdl.headline} onChange={e=>{const v=e.target.value;sHeadlines(p=>{const c=[...p];c[ahIdx]={...c[ahIdx],headline:v};return c})}} rows={2} placeholder="Headline" style={{marginBottom:6}}/>
                  {headItalicFontName&&<div style={{fontSize:9,color:"var(--t4)",fontFamily:"var(--mono)",marginBottom:6}}>Wrap in *asterisks* for italic swashes</div>}
                  {!subLocked&&<textarea value={aHdl.subheadline} onChange={e=>{const v=e.target.value;sHeadlines(p=>{const c=[...p];c[ahIdx]={...c[ahIdx],subheadline:v};return c})}} rows={1} placeholder="Subheadline"/>}
                </div>
              </div>

              <div className="sec"><div className="sec-t">Subheadline</div>
                <div className="row" style={{marginBottom:8,gap:6}}>
                  <button className={`btn ${subLocked?"on":""}`} onClick={()=>sSubLocked(!subLocked)} style={{fontSize:9,padding:"4px 10px"}}>{subLocked?"Locked":"Per-headline"}</button>
                  <span style={{fontSize:9,color:"var(--t4)"}}>{subLocked?"Same for all":"Each headline has its own"}</span>
                </div>
                {subLocked&&<input type="text" value={lockedSub} onChange={e=>sLockedSub(e.target.value)} placeholder="Locked subheadline text" style={{marginBottom:8}}/>}
                <div className="fld"><div className="fl"><span>Size</span><span className="fv">{subSize}px</span></div><input type="range" min={8} max={80} value={subSize} onChange={e=>sSubSize(+e.target.value)}/></div>
                <div className="row gap3" style={{marginBottom:8}}><button className={`btn ${subBold?"on":""}`} onClick={()=>sSubBold(!subBold)}>Bold</button></div>
                <div className="fld"><div className="fl"><span>Letter Spacing</span><span className="fv">{subLetterSp}</span></div><input type="range" min={0} max={20} value={subLetterSp} onChange={e=>sSubLetterSp(+e.target.value)}/></div>
              </div>

              <div className="sec"><div className="sec-t">Pairing Mode</div>
                <div className="row gap3" style={{marginBottom:8}}>
                  <button className={`btn ${expMode==="all"?"on":""}`} style={{flex:1,textAlign:"center"}} onClick={()=>sExpMode("all")}>All combos</button>
                  <button className={`btn ${expMode==="paired"?"on":""}`} style={{flex:1,textAlign:"center"}} onClick={()=>{sExpMode("paired");if(!pairings.length)shufflePairings()}}>1:1 Paired</button>
                </div>
                <div style={{fontSize:9,color:"var(--t4)",fontFamily:"var(--mono)"}}>{expMode==="all"?"Every headline \u00d7 every image":"One headline per image"}</div>
              </div>

              {expMode==="paired"&&(images.length>0||headlines.length>1)&&<div className="sec"><div className="sec-t">Pairings ({pairings.length||"\u2014"})</div>
                <button className="btn" onClick={shufflePairings} style={{width:"100%",marginBottom:8,textAlign:"center"}}>Shuffle</button>
                {pairings.length>0&&<div style={{maxHeight:200,overflowY:"auto",border:"1px solid var(--border)",borderRadius:"var(--r)"}}>
                  {pairings.map((p,i)=>{
                    const img=images[p.imgIdx];const hdl=headlines[p.hdlIdx];
                    return(<div key={i} onClick={()=>{if(images.length)sAiIdx(p.imgIdx);sAhIdx(p.hdlIdx)}} style={{padding:"6px 10px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:6,fontSize:10,cursor:"pointer",transition:"background .1s"}} onMouseEnter={e=>e.currentTarget.style.background="var(--as)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <span style={{color:"var(--t4)",fontFamily:"var(--mono)",minWidth:20}}>{i+1}</span>
                      {img&&<img src={img.url} style={{width:28,height:28,objectFit:"cover",borderRadius:3,border:"1px solid var(--border)"}}/>}
                      <div style={{flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"var(--t1)"}}>{hdl?.headline||"\u2014"}</div>
                      <select value={p.hdlIdx} onChange={e=>{const v=+e.target.value;sPairings(pr=>{const c=[...pr];c[i]={...c[i],hdlIdx:v};return c})}} style={{background:"var(--bg-3)",border:"1px solid var(--border)",color:"var(--t1)",borderRadius:"var(--r)",fontSize:9,padding:"2px 4px",maxWidth:80}}>
                        {headlines.map((h,hi)=>(<option key={hi} value={hi}>{(h.headline||"\u2014").substring(0,20)}</option>))}
                      </select>
                    </div>)
                  })}
                </div>}
              </div>}
            </>}

            {/* ═══ STYLE TAB ═══ */}
            {tab==="style"&&<>
              <div className="sec"><div className="sec-t">Block Position</div>
                <div className="pg" style={{marginBottom:8}}>{POS.map((p,i)=>(<div key={p.id} className={`pc ${curPosId===p.id?"on":""}`} onClick={()=>setPos(p)}>{POS_LABELS[i]}</div>))}</div>
                <div className="collapse-head" onClick={()=>sShowAlign(!showAlign)}>
                  <span style={{fontSize:9,color:"var(--t3)",fontFamily:"var(--mono)",letterSpacing:".04em"}}>ALIGNMENT & FINE TUNE</span>
                  <span className={`collapse-arrow ${showAlign?"open":""}`}>&#x25B6;</span>
                </div>
                {showAlign&&<>
                  <div className="row gap3" style={{marginBottom:8}}>{["left","center","right"].map(a=>(<button key={a} className={`btn ${textAlign===a?"on":""}`} onClick={()=>sTextAlign(a)} style={{flex:1,textAlign:"center",padding:"8px 12px"}}>{a[0].toUpperCase()+a.slice(1)}</button>))}</div>
                  <div className="fld"><div className="fl"><span>X</span><span className="fv">{blockX}%</span></div><input type="range" min={5} max={95} value={blockX} onChange={e=>sBlockX(+e.target.value)}/></div>
                  <div className="fld"><div className="fl"><span>Y</span><span className="fv">{blockY}%</span></div><input type="range" min={5} max={95} value={blockY} onChange={e=>sBlockY(+e.target.value)}/></div>
                </>}
              </div>

              <div className="sec"><div className="sec-t">Headline</div>
                <div className="fld"><div className="fl"><span>Size</span><span className="fv">{headSize}px</span></div><input type="range" min={16} max={200} value={headSize} onChange={e=>sHeadSize(+e.target.value)}/></div>
                <div className="row gap3" style={{marginBottom:8}}>
                  <button className={`btn ${headBold?"on":""}`} onClick={()=>sHeadBold(!headBold)}>Bold</button>
                  <button className={`btn ${headItalic?"on":""}`} onClick={()=>sHeadItalic(!headItalic)}>Italic</button>
                </div>
                <div className="fld"><div className="fl"><span>Letter Spacing</span><span className="fv">{headLetterSp}</span></div><input type="range" min={0} max={20} value={headLetterSp} onChange={e=>sHeadLetterSp(+e.target.value)}/></div>
                <div className="fld"><div className="fl"><span>Line Height</span><span className="fv">{headLineH}</span></div><input type="range" min={.8} max={2.5} step={.05} value={headLineH} onChange={e=>sHeadLineH(+e.target.value)}/></div>
                <div className="fld"><div className="fl"><span>Max Width</span><span className="fv">{headMaxWPct}%</span></div><input type="range" min={20} max={100} value={headMaxWPct} onChange={e=>sHeadMaxWPct(+e.target.value)}/></div>
              </div>

              <div className="sec"><div className="sec-t">Element Order & Spacing</div>
                <div className="el-order">
                  {blockOrder.map((elId,i)=>{
                    const label={logo:"Logo",head:"Headline",sub:"Subhead"}[elId];
                    const colorVal=elId==="logo"?(logoTint||"#ffffff"):elId==="head"?headColor:subColor;
                    const setColor=elId==="logo"?(v)=>sLogoTint(v):elId==="head"?sHeadColor:sSubColor;
                    const canUp=i>0;const canDn=i<blockOrder.length-1;
                    const move=(from,to)=>{sBlockOrder(o=>{const a=[...o];[a[from],a[to]]=[a[to],a[from]];return a})};
                    const nextId=blockOrder[i+1];
                    const gapKey=elId==="logo"||(nextId==="logo")?"logoHeadGap":"headSubGap";
                    const gapVal=gapKey==="logoHeadGap"?logoHeadGap:headSubGap;
                    const setGap=gapKey==="logoHeadGap"?sLogoHeadGap:sHeadSubGap;
                    return(<React.Fragment key={elId}>
                      <div className="el-row">
                        <input type="color" className="el-color" value={colorVal} onChange={e=>setColor(e.target.value)}/>
                        <span className="el-name">{label}</span>
                        <div className="el-arrows">
                          <button onClick={()=>canUp&&move(i,i-1)} style={{opacity:canUp?1:.25}}>&#x25B4;</button>
                          <button onClick={()=>canDn&&move(i,i+1)} style={{opacity:canDn?1:.25}}>&#x25BE;</button>
                        </div>
                      </div>
                      {i<blockOrder.length-1&&<div className="el-spacer">
                        <input type="range" min={0} max={200} value={gapVal} onChange={e=>setGap(+e.target.value)}/>
                        <span className="el-sp-val">{gapVal}px</span>
                      </div>}
                    </React.Fragment>)
                  })}
                </div>
                <div className="sec-t" style={{marginTop:4}}>Distribution</div>
                <div className="dist-modes">
                  {[
                    {id:"stack",l:"Stack",bars:[{t:40,h:2},{t:44,h:3},{t:50,h:2}]},
                    {id:"spread",l:"Spread",bars:[{t:15,h:2},{t:70,h:3},{t:76,h:2}]},
                    {id:"equal",l:"Equal",bars:[{t:15,h:2},{t:44,h:3},{t:73,h:2}]},
                    {id:"top-pair",l:"Top+Btm",bars:[{t:15,h:2},{t:21,h:3},{t:73,h:2}]},
                  ].map(d=>(<div key={d.id} className={`dist-btn ${distMode===d.id?"on":""}`} onClick={()=>sDistMode(d.id)}>
                    <div className="dist-icon" style={{position:"relative",height:24}}>
                      {d.bars.map((b,bi)=>(<span key={bi} style={{position:"absolute",top:b.t+"%",height:b.h,background:distMode===d.id?"var(--t1)":"var(--t4)",width:bi===1?16:10,left:"50%",transform:"translateX(-50%)"}}/>))}
                    </div>
                    <div className="dist-lbl">{d.l}</div>
                  </div>))}
                </div>
              </div>

              <div className="sec"><div className="sec-t">Background</div>
                <div className="row" style={{gap:10}}><input type="color" value={bgColor} onChange={e=>sBgColor(e.target.value)}/><input type="text" value={bgColor} onChange={e=>sBgColor(e.target.value)} style={{flex:1,fontSize:10,fontFamily:"var(--mono)"}}/></div>
              </div>

              <div className="sec"><div className="sec-t">OpenType Features</div>
                {!headOTFont&&<div style={{fontSize:10,color:"var(--t4)",marginBottom:6}}>Upload a font with OT features to enable</div>}
                {headOTFont&&!otFeatures.length&&<div style={{fontSize:10,color:"var(--t4)",marginBottom:6}}>No GSUB features found in this font</div>}
                {otFeatures.length>0&&<>
                  <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:6}}>
                    {otFeatures.map(f=>(<button key={f} className={`pill ${enabledOT[f]?"on":""}`} onClick={()=>sEnabledOT(p=>({...p,[f]:!p[f]}))} style={{fontSize:9,padding:"3px 8px",fontFamily:"var(--mono)"}} title={OT_LABELS[f]||f}>{f}{OT_LABELS[f]?` - ${OT_LABELS[f]}`:""}</button>))}
                  </div>
                  <div className="row gap3">
                    <button className="btn-g" onClick={()=>{const a={};otFeatures.forEach(f=>a[f]=true);sEnabledOT(a)}}>All on</button>
                    <button className="btn-g" onClick={()=>{const a={};otFeatures.forEach(f=>a[f]=false);sEnabledOT(a)}}>All off</button>
                  </div>
                </>}
              </div>
            </>}

            {/* ═══ EFFECTS TAB ═══ */}
            {tab==="effects"&&<>
              <div className="sec"><div className="sec-t">Shadows</div>
                <div className="sg">{SHADOWS.map(s=>(<div key={s.id} className={`sc ${shadowMode===s.id?"on":""}`} onClick={()=>sShadowMode(s.id)}>
                  <div className="sp" style={{textShadow:s.layers.length?s.layers.map(l=>`${l.ox}px ${Math.min(l.oy,6)}px ${Math.min(l.blur,15)}px rgba(${hexRgb(l.c).join(",")},${l.op})`).join(","):"none"}}>Aa</div>{s.l}
                </div>))}</div>
                <div className="ss-wrap"><div className="fl"><span>Strength</span><span className="fv">{Math.round(shadowStrength*100)}%</span></div>
                <input type="range" min={0} max={300} value={Math.round(shadowStrength*100)} onChange={e=>sShadowStrength(+e.target.value/100)}/></div>
              </div>

              <div className="sec"><div className="sec-t">Overlay</div>
                <div className="og">{OVERLAYS.map(o=>(<button key={o.v} className={`ob ${overlay===o.v?"on":""}`} onClick={()=>sOverlay(o.v)}>{o.l}</button>))}</div>
              </div>

              <div className="sec"><div className="sec-t">Image Texture</div>
                <div className="tex-grid">
                  {[{id:"none",l:"None"},{id:"grain",l:"Grain"},{id:"paper",l:"Paper"},{id:"canvas",l:"Canvas"},{id:"halftone",l:"Halftone"},{id:"custom",l:"Custom"}].map(t=>(<button key={t.id} className={`tex-btn ${texMode===t.id?"on":""}`} onClick={()=>{if(t.id==="custom"){texR.current&&texR.current.click()}else sTexMode(t.id)}}>{t.l}</button>))}
                </div>
                <input ref={texR} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const img=new Image();img.onload=()=>{sTexImg(img);sTexMode("custom")};img.src=URL.createObjectURL(f)}}/>
                {texMode!=="none"&&<div className="fld" style={{marginTop:6}}>
                  <div className="fl"><span>Opacity</span><span className="fv">{texOpacity}%</span></div>
                  <input type="range" min={5} max={100} value={texOpacity} onChange={e=>sTexOpacity(+e.target.value)}/>
                </div>}
                {texMode==="custom"&&texImg&&<div style={{fontSize:9,color:"var(--t3)",fontFamily:"var(--mono)",marginTop:4}}>Custom texture loaded</div>}
                <div style={{fontSize:8,color:"var(--t4)",fontFamily:"var(--mono)",marginTop:4}}>Applied over the entire image via multiply blend</div>
              </div>

              <div className="sec"><div className="sec-t">Text Texture</div>
                <div className="tex-grid">
                  {[{id:"none",l:"None"},{id:"grain",l:"Grain"},{id:"paper",l:"Paper"},{id:"foil",l:"Foil"},{id:"halftone",l:"Dots"},{id:"custom",l:"Custom"}].map(t=>(<button key={t.id} className={`tex-btn ${txtTexMode===t.id?"on":""}`} onClick={()=>{if(t.id==="custom"){txtTexR.current&&txtTexR.current.click()}else sTxtTexMode(t.id)}}>{t.l}</button>))}
                </div>
                <input ref={txtTexR} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const img=new Image();img.onload=()=>{sTxtTexImg(img);sTxtTexMode("custom")};img.src=URL.createObjectURL(f)}}/>
                {txtTexMode!=="none"&&<div className="fld" style={{marginTop:6}}>
                  <div className="fl"><span>Opacity</span><span className="fv">{txtTexOpacity}%</span></div>
                  <input type="range" min={5} max={100} value={txtTexOpacity} onChange={e=>sTxtTexOpacity(+e.target.value)}/>
                </div>}
                {txtTexMode==="custom"&&txtTexImg&&<div style={{fontSize:9,color:"var(--t3)",fontFamily:"var(--mono)",marginTop:4}}>Custom texture loaded</div>}
                <div style={{fontSize:8,color:"var(--t4)",fontFamily:"var(--mono)",marginTop:4}}>Applied only to text and logo elements</div>
              </div>
            </>}

          </div>
        </aside>

        {/* ═══ CANVAS — CENTER ═══ */}
        <main className="ca">
          <div className="toolbar">
            <div className="t-seg" style={{gap:4}}>
              <button onClick={()=>setAllColor("#ffffff")} title="White" style={{width:16,height:16,borderRadius:"50%",border:logoTint==="#ffffff"?"2px solid var(--t0)":"1px solid var(--border)",background:"#fff",cursor:"pointer",padding:0,flexShrink:0}}/>
              <button onClick={()=>setAllColor("#000000")} title="Black" style={{width:16,height:16,borderRadius:"50%",border:logoTint==="#000000"?"2px solid var(--t0)":"1px solid var(--border-h)",background:"#000",cursor:"pointer",padding:0,flexShrink:0}}/>
              <input type="color" value={customHex} onChange={e=>{sCustomHex(e.target.value);setAllColor(e.target.value)}} title="Custom" style={{width:16,height:16,border:"1px solid var(--border)",borderRadius:"50%",cursor:"pointer",padding:1,background:"transparent",flexShrink:0}}/>
              {logoTint&&<button onClick={clearTint} style={{background:"none",border:"none",color:"var(--t4)",cursor:"pointer",fontSize:8,fontFamily:"var(--mono)",padding:0}}>{"\u00d7"}</button>}
            </div>
            {images.length>1&&<div className="t-seg nav">
              <button onClick={()=>sAiIdx(i=>i>0?i-1:images.length-1)}>&#8249;</button>
              <span className="t-lbl">{aiIdx+1}/{images.length}</span>
              <button onClick={()=>sAiIdx(i=>i<images.length-1?i+1:0)}>&#8250;</button>
            </div>}
            {headlines.length>1&&<div className="t-seg nav">
              <button onClick={()=>sAhIdx(i=>i>0?i-1:headlines.length-1)}>&#8249;</button>
              <span className="t-lbl">H{ahIdx+1}/{headlines.length}</span>
              <button onClick={()=>sAhIdx(i=>i<headlines.length-1?i+1:0)}>&#8250;</button>
            </div>}
            {selFmts.map(id=>{const p=PRESETS.find(x=>x.id===id);return<button key={id} className={`t-fmt ${preview===id?"on":""}`} onClick={()=>sPreview(id)}>{p.label}</button>})}
            <div className="t-seg" style={{marginLeft:"auto",borderRight:"none",borderLeft:"1px solid var(--border)"}}>
              <span className="t-lbl">{presetObj.w}&times;{presetObj.h}</span>
            </div>
          </div>
          <div className="cw"><canvas ref={cRef}/></div>
        </main>

        {/* ═══ RIGHT SIDEBAR — FORMATS & QUEUE ═══ */}
        <aside className="rsidebar">
          <div className="r-head">Output</div>
          <div className="panel">
            {exporting&&<div className="pb" style={{marginBottom:12}}><div className="f" style={{width:expProg+"%"}}/></div>}

            <div className="sec"><div className="sec-t">Formats ({selFmts.length})</div>
              {PRESETS.map(p=>(<div key={p.id} className={`fc ${selFmts.includes(p.id)?"sel":""}`} onClick={()=>togFmt(p.id)} style={{padding:"7px 10px"}}>
                <input type="checkbox" checked={selFmts.includes(p.id)} onChange={()=>togFmt(p.id)}/>
                <div style={{flex:1}}><div className="nm">{p.label}</div><div className="dm">{p.w}x{p.h} {p.ratio}</div></div>
              </div>))}
              <div className="row" style={{marginTop:6,gap:8}}>
                <button className="btn-g" onClick={()=>sSelFmts(PRESETS.map(p=>p.id))}>All</button>
                <button className="btn-g" onClick={()=>sSelFmts([])}>None</button>
              </div>
            </div>

            <div className="sec"><div className="sec-t">Queue ({queue.length})</div>
              {queue.length===0&&<div className="queue-empty">Add items with the + Queue button above</div>}
              {queue.map(qi=>(<div key={qi.id} className="q-card">
                <img className="q-thumb" src={qi.thumb} alt=""/>
                <div className="q-info">
                  <div className="q-title">{qi.headline||"Untitled"}</div>
                  <div className="q-meta">img {qi.imgIdx+1} / hdl {qi.hdlIdx+1}</div>
                </div>
                <button className="q-rm" onClick={()=>rmQueue(qi.id)}>&times;</button>
              </div>))}
              {queue.length>1&&<button className="btn-g" onClick={()=>sQueue([])} style={{marginTop:4}}>Clear all</button>}
            </div>

            <div className="sec"><div className="sec-t">Resolution</div>
              <div className="rr">{[1,2,3,4].map(s=>(<div key={s} className={`rb ${expScale===s?"on":""}`} onClick={()=>sExpScale(s)}><span className="big">{s}x</span><span className="sm">{presetObj.w*s}x{presetObj.h*s}</span></div>))}</div>
            </div>

            <div className="sec"><div className="sec-t">Batch Name</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:6}}>
                {projectTags.map((t,i)=>(<span key={i} style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 6px",borderRadius:10,background:"var(--bg-3)",border:"1px solid var(--border)",fontSize:8,color:"var(--t2)",fontFamily:"var(--mono)"}}>
                  {t}<button onClick={()=>sProjectTags(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"var(--t4)",cursor:"pointer",fontSize:7,padding:0}}>x</button>
                </span>))}
              </div>
              <input type="text" value={tagInput} onChange={e=>sTagInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&tagInput.trim()){sProjectTags(p=>[...p,tagInput.trim()]);sTagInput("")}}} placeholder="Add tag + Enter" style={{fontSize:9,marginBottom:6}}/>
              <div style={{display:"flex",flexWrap:"wrap",gap:2}}>
                {["launch","promo","seasonal","social","event","product","sale","collab"].map(q=>(<button key={q} className="btn" style={{fontSize:7,padding:"2px 5px"}} onClick={()=>{if(!projectTags.includes(q))sProjectTags(p=>[...p,q])}}>{q}</button>))}
              </div>
              <div style={{marginTop:6,fontSize:8,color:"var(--t4)",fontFamily:"var(--mono)"}}>
                Tags append to export filenames
              </div>
            </div>
          </div>
        </aside>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
